name: CI

# Quality gates for every PR (RC-007): typecheck, lint, build, and a Playwright
# smoke test. All four must pass (green ✓) before a PR is trusted for merge.
# No secrets required — this is quality-gates only; deploys are handled separately
# (see AGENTS.md "Deploys & preview URLs").

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: typecheck · lint · build · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Smoke test (Playwright)
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Performance budget (RC-305). Runs in PARALLEL with quality-gates so it never
  # slows the main test job. Lighthouse CI builds the site, starts Next on 3100,
  # audits `/` and `/acoperisuri` under mobile emulation, and fails the job if the
  # budgets in lighthouserc.json are breached (performance/SEO/a11y scores, LCP, CLS).
  lighthouse:
    name: lighthouse (perf budget)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun

      - name: Upload Lighthouse report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7

  # The honest half of the RC-305 trade (owner decision 2026-07-16). The gate
  # above no longer measures the hero, because audit robots now skip the 3D —
  # that is what stops the run crashing (PAGE_HUNG / Network.getResponseBody).
  # This job forces the 3D ON via `?3d=1` and reports the hero's REAL cost.
  #
  # continue-on-error: it must NEVER block a PR. It exists so the number stays
  # visible, instead of the gate quietly implying a 3D hero is free. If THIS job
  # starts crashing, that is the signal the hero has grown too heavy for real
  # low-end phones — read the artifact, do not just mute it.
  lighthouse-3d:
    name: lighthouse (3D hero, report only)
    # MANUAL ONLY (Actions -> CI -> Run workflow), deliberately not on PRs.
    # `continue-on-error` stops the WORKFLOW failing but GitHub still reports the
    # job as a failed check, so on a PR this reporter showed up as a red X next to
    # the real gates — a report masquerading as a blocker. Wrong signal, and it
    # trained us to ignore red.
    #
    # It cannot produce a number today anyway: the real 3D hero crashes Lighthouse
    # on a throttled 2-core runner (PAGE_HUNG / Network.getResponseBody). That is a
    # REAL finding, not a CI defect — the hero is too heavy for a low-end phone —
    # and it is recorded in the factory's KNOWN-FAILURES.md rather than smothered.
    # Once the hero is slimmed (DRACO: 1.04 MB -> 36.9 KB measured), run this to get
    # the true number, and put it back on `push: main` when it can pass.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # No `|| true` here. An earlier version had it AND continue-on-error, so
      # the step could never fail and the job reported green even when the run
      # crashed — a check that cannot fail is worse than no check, because its
      # green gets read as evidence. continue-on-error alone keeps it from
      # blocking a PR while still recording what really happened.
      - name: Run Lighthouse CI against the real 3D hero
        run: npx lhci autorun --config=lighthouserc.3d.json

      - name: Upload 3D Lighthouse report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-3d
          path: .lighthouseci/
          retention-days: 7
