name: CI

# Quality gates for every PR (RC-007): typecheck, lint, build, and a Playwright
# smoke test. All four must pass (green ✓) before a PR is trusted for merge.
# No secrets required — this is quality-gates only; deploys are handled separately
# (see AGENTS.md "Deploys & preview URLs").

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: typecheck · lint · build · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Smoke test (Playwright)
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
